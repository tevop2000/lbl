name: Build macOS Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore AgentManagement.Avalonia.csproj

      - name: Publish macOS x64
        run: |
          dotnet publish AgentManagement.Avalonia.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishTrimmed=false \
            -p:PublishSingleFile=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/osx-x64

      - name: Create .app bundle structure
        run: |
          APP_DIR="./publish/osx-x64/AgentManagement.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"
          mkdir -p "$APP_DIR/Frameworks"

      - name: Copy binaries to .app
        run: |
          APP_MACOS="./publish/osx-x64/AgentManagement.app/Contents/MacOS"
          cp ./publish/osx-x64/AgentManagement.Avalonia "$APP_MACOS/"
          cp ./publish/osx-x64/AgentManagement.Avalonia.deps.json "$APP_MACOS/"
          cp ./publish/osx-x64/AgentManagement.Avalonia.runtimeconfig.json "$APP_MACOS/"
          cp -r ./publish/osx-x64/runtimes "$APP_MACOS/" 2>/dev/null || true
          cp -r ./publish/osx-x64/libSkiaSharp.dylib "$APP_MACOS/" 2>/dev/null || true
          cp -r ./publish/osx-x64/Assets "$APP_MACOS/" 2>/dev/null || true
          cp -r ./publish/osx-x64/Resources "$APP_MACOS/" 2>/dev/null || true

      - name: Create Info.plist
        run: |
          cat > ./publish/osx-x64/AgentManagement.app/Contents/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleDevelopmentRegion</key>
  <string>en</string>
  <key>CFBundleDisplayName</key>
  <string>AgentManagement</string>
  <key>CFBundleExecutable</key>
  <string>AgentManagement.Avalonia</string>
  <key>CFBundleIdentifier</key>
  <string>com.example.agentmanagement</string>
  <key>CFBundleInfoDictionaryVersion</key>
  <string>6.0</string>
  <key>CFBundleName</key>
  <string>AgentManagement</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>CFBundleShortVersionString</key>
  <string>1.0.0</string>
  <key>CFBundleVersion</key>
  <string>1.0.0</string>
  <key>LSMinimumSystemVersion</key>
  <string>10.15</string>
  <key>NSHighResolutionCapable</key>
  <true/>
</dict>
</plist>
EOF

      - name: Create PkgInfo
        run: |
          echo -n 'APPL????' > ./publish/osx-x64/AgentManagement.app/Contents/PkgInfo

      - name: Make executable
        run: |
          chmod +x ./publish/osx-x64/AgentManagement.app/Contents/MacOS/AgentManagement.Avalonia

      - name: Create DMG installer
        run: |
          cd ./publish/osx-x64
          mkdir -p DMGContents
          cp -r AgentManagement.app DMGContents/
          hdiutil create -volname "AgentManagement" -srcfolder DMGContents -ov -format UDZO AgentManagement.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            ./publish/osx-x64/AgentManagement.dmg
            ./publish/osx-x64/AgentManagement.app
